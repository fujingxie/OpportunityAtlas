services:
  postgres:
    image: postgres:16-alpine
    container_name: opportunity-atlas-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - opportunity_atlas_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: opportunity-atlas-prod-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "${APP_PORT:-3100}:3000"
    volumes:
      - opportunity_atlas_prod_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  opportunity_atlas_prod_pgdata:
  opportunity_atlas_prod_uploads:
